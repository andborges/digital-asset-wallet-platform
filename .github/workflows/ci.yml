name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - run: make build
      - run: make lint
      - run: make test
      - run: make contracts-test
      - run: make check-import-boundary
