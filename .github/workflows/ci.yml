name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: make build
      - run: make lint
      - run: make test
      # Story 2.1 adds an import-boundary check to this same job — do not create a
      # second workflow file for it.
